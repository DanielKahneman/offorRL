hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra_plugins.hydra_joblib_launcher.joblib_launcher.JoblibLauncher
    n_jobs: -1
    backend: null
    prefer: processes
    require: null
    verbose: 0
    timeout: null
    pre_dispatch: 2*n_jobs
    batch_size: auto
    temp_folder: null
    max_nbytes: null
    mmap_mode: r
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: null
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - trainer=iql
    - env.name=Hopper-v2
  job:
    name: main_off
    chdir: null
    override_dirname: env.name=Hopper-v2,trainer=iql
    id: ???
    num: ???
    config_name: base.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.1'
    cwd: /root/offorRL/d4rl
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /root/offorRL/d4rl/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      spec: null
      trainer: iql
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: joblib
      hydra/output: default
  verbose: false
device:
  seed: 0
  cuda: true
  gpu_idx: 0
logger:
  log_dir: /home/zy/zz/all_logs/offorrl
env:
  name: Hopper-v2
  max_episode_steps: -1
buffer:
  max_replay_buffer_size: 2000000
rlalg:
  online_finetune: false
  start_epoch: -1000
  num_epochs: 0
  batch_size: 256
  num_eval_steps_per_epoch: 10000
  num_trains_per_train_loop: 1000
  num_expl_steps_per_train_loop: 1000
  min_num_steps_before_training: 1000
  num_epochs_per_log_interval: 1
  save_best: false
trainer:
  name: IQL
  obs_norm: false
  reward_norm: true
  qf_kwargs:
    hidden_sizes:
    - 256
    - 256
  vf_kwargs:
    hidden_sizes:
    - 256
    - 256
  policy_type: GaussianPolicy
  policy_kwargs:
    hidden_sizes:
    - 256
    - 256
    max_log_std: 2
    min_log_std: -5
    std_architecture: values
  expl_kwargs: null
  trainer_kwargs:
    total_training_steps: 1000000.0
    discount: 0.99
    policy_lr: 0.0003
    qf_lr: 0.0003
    reward_scale: 1.0
    soft_target_tau: 0.005
    policy_weight_decay: 0.0
    cosine_lr_decay: true
    q_weight_decay: 0.0
    beta: 3.0
    quantile: 0.7
    clip_score: 100.0
    lambda_: 1.0
  exp_prefix: r_norm=${trainer.reward_norm}_s_norm=${trainer.obs_norm}_lambda=${trainer.trainer_kwargs.lambda_}_soft_tau=${trainer.trainer_kwargs.soft_target_tau}_beta=${trainer.trainer_kwargs.beta}_quantile=${trainer.trainer_kwargs.quantile}_clip_score=${trainer.trainer_kwargs.clip_score}
spec: null
